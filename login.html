<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - UPMISA</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- JSRSAsign for JWT -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsrsasign/10.5.27/jsrsasign-all-min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#f8fafc',
                        primary: { DEFAULT: '#2563eb', foreground: '#ffffff' },
                    }
                }
            }
        }
    </script>
    <meta name="theme-color" content="#2563eb">
    <link rel="stylesheet" href="styles.css">
</head>

<body class="min-h-screen bg-slate-50">
    <div id="loginScreen"
        class="fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900 px-4">
        <div class="w-full max-w-md rounded-3xl bg-white/95 shadow-2xl border border-white/20 p-8 login-card">
            <div class="text-center mb-8">
                <div
                    class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-blue-600 text-white font-black text-2xl shadow-lg">
                    U</div>
                <h1 class="mt-5 text-2xl font-bold text-slate-900">Đăng nhập hệ thống</h1>
                <p class="mt-2 text-sm text-slate-500">Tài khoản đăng nhập là <b>id</b>, mật khẩu là <b>mat_khau</b>
                    từ sheet DSNV.</p>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="loginId">Tài khoản</label>
                    <input id="loginId" type="text" placeholder="Nhập id nhân viên"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1" for="loginPassword">Mật khẩu</label>
                    <input id="loginPassword" type="password" placeholder="Nhập mật khẩu"
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500">
                </div>
                <button onclick="handleLogin()"
                    class="w-full py-3.5 rounded-xl bg-blue-600 text-white font-semibold hover:bg-blue-700 transition-colors shadow-lg shadow-blue-600/20">Đăng
                    nhập</button>
                <p id="loginError" class="hidden text-sm text-rose-600 text-center"></p>
            </div>
        </div>
    </div>

    <div id="loginLoading" class="hidden fixed inset-0 z-40 flex items-center justify-center bg-white/80">
        <div class="flex flex-col items-center py-6">
            <div class="spinner mb-4"></div>
            <p class="text-sm text-slate-600 font-medium">Đang xác thực dữ liệu...</p>
        </div>
    </div>

    <div id="toastContainer"></div>
    <script src="js/config.js"></script>
    <script src="js/state.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/main.js"></script>
</body>

</html>
